name: Update GitOps versions

on:
  workflow_call:
    inputs:
      service_key:
        type: string
        required: true
        description: 'Key in versions.yaml (e.g. auth-service) or label for commit message when using yaml_path'
      image_tag:
        type: string
        required: true
        description: 'Image tag value to set, e.g. 2.2.32'
      gitops_repo:
        type: string
        required: false
        default: 'PilotDataPlatform/pilot-hdc-platform-gitops'
        description: 'GitOps repository (org/repo)'
      versions_file:
        type: string
        required: false
        default: ''
        description: 'Explicit file path to update. When empty, defaults to clusters/<environment>/versions.yaml'
      yaml_path:
        type: string
        required: false
        default: ''
        description: 'Custom yq path (e.g. .base-chart-hdc.image.tag). When empty, uses .[service_key].image.tag'
      environment:
        type: string
        required: false
        default: 'dev'
        description: 'Target environment — used to construct default file path when versions_file is empty'
    secrets:
      HDC_CSCS_INFRA_READ_WRITE_TOKEN:
        required: true
        description: 'PAT with write access to the gitops repo'

jobs:
  update-versions:
    name: Bump ${{ inputs.service_key }} to ${{ inputs.image_tag }}
    runs-on: hdc-dev-runners-public
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.gitops_repo }}
          token: ${{ secrets.HDC_CSCS_INFRA_READ_WRITE_TOKEN }}
          ref: main

      - name: Resolve target file
        id: resolve
        run: |
          if [ -n "${{ inputs.versions_file }}" ]; then
            echo "target_file=${{ inputs.versions_file }}" >> $GITHUB_OUTPUT
          else
            echo "target_file=clusters/${{ inputs.environment }}/versions.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Validate target exists
        env:
          SERVICE_KEY: ${{ inputs.service_key }}
        run: |
          TARGET_FILE="${{ steps.resolve.outputs.target_file }}"
          if [ -n "${{ inputs.yaml_path }}" ]; then
            if ! yq -e '${{ inputs.yaml_path }}' "$TARGET_FILE" > /dev/null 2>&1; then
              echo "::error::yaml_path '${{ inputs.yaml_path }}' not found in $TARGET_FILE"
              exit 1
            fi
          else
            if ! yq -e '.[env(SERVICE_KEY)]' "$TARGET_FILE" > /dev/null 2>&1; then
              echo "::error::service_key '$SERVICE_KEY' not found in $TARGET_FILE"
              exit 1
            fi
          fi

      - name: Update image tag
        env:
          SERVICE_KEY: ${{ inputs.service_key }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          TARGET_FILE="${{ steps.resolve.outputs.target_file }}"
          if [ -n "${{ inputs.yaml_path }}" ]; then
            yq -i '${{ inputs.yaml_path }} = env(IMAGE_TAG)' "$TARGET_FILE"
          else
            yq -i '.[env(SERVICE_KEY)].image.tag = env(IMAGE_TAG)' "$TARGET_FILE"
          fi

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — tag already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          SERVICE_KEY: ${{ inputs.service_key }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          git commit -am "ci: bump $SERVICE_KEY image tag to $IMAGE_TAG"
          # Retry with rebase to handle concurrent pushes from other services
          PUSHED=false
          for i in 1 2 3; do
            if git push origin main; then
              PUSHED=true
              break
            fi
            echo "Push failed (attempt $i/3), rebasing and retrying..."
            git pull --rebase origin main
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::Failed to push after 3 attempts"
            exit 1
          fi
